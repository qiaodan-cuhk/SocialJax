name: socialjax
channels:
  - conda-forge
dependencies:
  - python=3.10

  # framework
  - cuda-version=11.8
  - cudatoolkit=11.8
  - jaxlib=0.4.23=*cuda*
  - jax=0.4.23

  # SocialJax deps
  - flax==0.7.4
  - scipy==1.12.0
  - distrax==0.1.5
  - safetensors==0.5.2
  - hydra-core==1.3.2
  - wandb==0.18.5

  - pip
  - pip:
    # setuptools>=82 drops pkg_resources; tensorboard still needs it
    - setuptools>=70,<82
    - gymnax==0.0.8
    - tensorflow-probability==0.25.0
    - tensorboardX>=2.6
    - tensorboard>=2.14
    - pillow>=10.0.0
    - matplotlib>=3.8.0
